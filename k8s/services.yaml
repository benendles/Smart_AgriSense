# Smart AgriSense — the four AI microservices.
# Replace REGISTRY below (or via kustomize/sed in CI) with your image registry.
# Each Deployment bakes its model into the image, so no PVC/model volume needed.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: plant-detection, namespace: agrisense }
spec:
  replicas: 1
  selector: { matchLabels: { app: plant-detection } }
  template:
    metadata: { labels: { app: plant-detection } }
    spec:
      containers:
        - name: plant-detection
          image: REGISTRY/plant-detection:latest
          ports: [{ containerPort: 8000 }]
          env:
            - { name: PORT, value: "8000" }
            - { name: MQTT_BROKER, value: "mosquitto" }
            - { name: MQTT_PORT, value: "1883" }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 40
            periodSeconds: 15
          resources:
            requests: { cpu: "250m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: plant-detection-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: plant-detection-data, namespace: agrisense }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: plant-detection, namespace: agrisense }
spec:
  type: NodePort
  selector: { app: plant-detection }
  ports: [{ port: 8000, targetPort: 8000, nodePort: 30003 }]
---
