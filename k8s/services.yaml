---
# Advisory "brain" — reasons over the four models' /latest outputs with Claude.
apiVersion: apps/v1
kind: Deployment
metadata: { name: advisory, namespace: agrisense }
spec:
  replicas: 1
  selector: { matchLabels: { app: advisory } }
  template:
    metadata: { labels: { app: advisory } }
    spec:
      containers:
        - name: advisory
          image: REGISTRY/advisory:latest
          ports: [{ containerPort: 8000 }]
          env:
            - { name: PORT, value: "8000" }
            - { name: ADVISORY_MODEL, value: "claude-opus-4-8" }
            # In-cluster URLs of the four model services (ClusterIP DNS names).
            - { name: CROP_URL,    value: "http://crop-recommendation:8000/recommendation/latest" }
            - { name: PLANT_URL,   value: "http://plant-detection:8000/plant/latest" }
            - { name: INSECT_URL,  value: "http://insect-detection:8000/insect/latest" }
            - { name: DISEASE_URL, value: "http://disease-detection:8000/disease/latest" }
            # Claude API key from the advisory-secrets Secret (created by the pipeline).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef: { name: advisory-secrets, key: ANTHROPIC_API_KEY }
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          volumeMounts:
            - { name: data, mountPath: /data }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: advisory-data }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: { name: advisory-data, namespace: agrisense }
spec:
  accessModes: [ReadWriteOnce]
  resources: { requests: { storage: 1Gi } }
---
apiVersion: v1
kind: Service
metadata: { name: advisory, namespace: agrisense }
spec:
  type: NodePort
  selector: { app: advisory }
  ports: [{ port: 8000, targetPort: 8000, nodePort: 30007 }]
