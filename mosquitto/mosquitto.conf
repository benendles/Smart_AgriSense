# Smart AgriSense MQTT broker
listener 1883
# Demo/dev: allow anonymous so the Pi can connect with no credentials.
# PRODUCTION: set `allow_anonymous false` and configure a password file:
#   docker exec -it agrisense-mqtt mosquitto_passwd -c /mosquitto/config/passwd pi
#   then add:  password_file /mosquitto/config/passwd
allow_anonymous true
persistence true
persistence_location /mosquitto/data/
