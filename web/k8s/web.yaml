# Smart AgriSense — web app Deployment + Service (in the same agrisense namespace).
# Reaches the backend services by in-cluster DNS (ClusterIP names), so no NodePorts
# are needed for those calls. The web app itself is exposed on NodePort 30080.
apiVersion: apps/v1
kind: Deployment
metadata: { name: web-app, namespace: agrisense }
spec:
  replicas: 1
  selector: { matchLabels: { app: web-app } }
  template:
    metadata: { labels: { app: web-app } }
    spec:
      containers:
        - name: web-app
          image: REGISTRY/smart-agrisense:latest
          ports: [{ containerPort: 3000 }]
          env:
            # Server-side fetches use the cluster-internal service names.
            - { name: PLANT_DETECTION_SERVICE_URL,  value: "http://plant-detection:8000" }
            - { name: INSECT_DETECTION_SERVICE_URL, value: "http://insect-detection:8000" }
            - { name: DISEASE_SERVICE_URL,          value: "http://disease-detection:8000" }
            - { name: RECOMMENDATION_SERVICE_URL,   value: "http://crop-recommendation:8000" }
            - { name: AGRICULTURE_SERVICE_URL,      value: "http://advisory:8000" }
            # Raw ESP32 sensor readings for the dashboard (same crop-recommendation pod).
            - { name: SENSOR_SERVICE_URL,           value: "http://crop-recommendation:8000" }
            # Manual pump commands are published here → Pi (pi_agent) → ESP32 relays.
            - { name: MQTT_URL,                     value: "mqtt://mosquitto:1883" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests: { cpu: "100m", memory: "192Mi" }
            limits:   { cpu: "500m", memory: "384Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: web-app, namespace: agrisense }
spec:
  type: NodePort
  selector: { app: web-app }
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30080 }]
